<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kingston Supabase Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .error {
      margin-top: 20px;
      background: #ffe5e5;
      color: #a40000;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    .ok {
      margin-top: 20px;
      background: #e8fff0;
      color: #0a6b2d;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Supabase Live Test</h1>

  <div class="grid">
    <div class="card">
      <div class="label">Status</div>
      <div class="value" id="status">Connecting...</div>
    </div>

    <div class="card">
      <div class="label">Company</div>
      <div class="value" id="company">...</div>
    </div>

    <div class="card">
      <div class="label">Staff</div>
      <div class="value" id="staff">...</div>
    </div>

    <div class="card">
      <div class="label">Customers</div>
      <div class="value" id="customers">...</div>
    </div>

    <div class="card">
      <div class="label">Invoices</div>
      <div class="value" id="invoices">...</div>
    </div>
  </div>

  <div id="message"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qmcznxnajxmcbjdfzoqb.supabase.co';
    const SUPABASE_KEY = sb_publishable_0P8BczXXThDbyz6aCUmqvQ_bIbR6CN9

    const statusEl = document.getElementById('status');
    const companyEl = document.getElementById('company');
    const staffEl = document.getElementById('staff');
    const customersEl = document.getElementById('customers');
    const invoicesEl = document.getElementById('invoices');
    const messageEl = document.getElementById('message');

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showError(msg) {
      statusEl.textContent = 'Error';
      messageEl.innerHTML = '<div class="error">' + msg + '</div>';
    }

    function showOk(msg) {
      messageEl.innerHTML = '<div class="ok">' + msg + '</div>';
    }

    async function getCount(tableName) {
      const { count, error } = await supabase
        .from(tableName)
        .select('*', { count: 'exact', head: true });

      if (error) throw error;
      return count ?? 0;
    }

    async function loadDashboard() {
      try {
        statusEl.textContent = 'Loading...';

        const [companyCount, staffCount, customersCount, invoicesCount] = await Promise.all([
          getCount('company'),
          getCount('staff'),
          getCount('customers'),
          getCount('invoices')
        ]);

        companyEl.textContent = companyCount;
        staffEl.textContent = staffCount;
        customersEl.textContent = customersCount;
        invoicesEl.textContent = invoicesCount;
        statusEl.textContent = 'Connected';

        showOk('Connected to Supabase successfully.');
      } catch (error) {
        showError(error.message);
      }
    }

    function subscribeLive() {
      supabase
        .channel('live-dashboard')
        .on(
          'postgres_changes',
          { event: '*', schema: 'public', table: 'company' },
          loadDashboard
        )
        .on(
          'postgres_changes',
          { event: '*', schema: 'public', table: 'staff' },
          loadDashboard
        )
        .on(
          'postgres_changes',
          { event: '*', schema: 'public', table: 'customers' },
          loadDashboard
        )
        .on(
          'postgres_changes',
          { event: '*', schema: 'public', table: 'invoices' },
          loadDashboard
        )
        .subscribe();
    }

    loadDashboard();
    subscribeLive();
  </script>
</body>
</html>
