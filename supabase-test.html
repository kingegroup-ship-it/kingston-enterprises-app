<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      padding: 24px;
    }
    .card {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1, h2 { color: #d4a63f; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0d0d0d;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <h1>Kingston Supabase Test</h1>

  <div class="card">
    <h2>Connection Status</h2>
    <div id="status">Connecting...</div>
  </div>

  <div class="card">
    <h2>Company</h2>
    <pre id="company">Loading...</pre>
  </div>

  <div class="card">
    <h2>Staff</h2>
    <pre id="staff">Loading...</pre>
  </div>

  <div class="card">
    <h2>Customers</h2>
    <pre id="customers">Loading...</pre>
  </div>

  <div class="card">
    <h2>Invoices</h2>
    <pre id="invoices">Loading...</pre>
  </div>

  <script>
   const SUPABASE_URL = 'https://uklgbmusuvcvjzpvfxuo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_5OTzVBsVU1v_uYeuA-mhIg_R9C-wcUO';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadData() {
      try {
        document.getElementById('status').textContent = 'Connected. Reading data...';

        const { data: company, error: companyError } = await supabaseClient
          .from('company_settings')
          .select('*')
          .limit(1);

        const { data: staff, error: staffError } = await supabaseClient
          .from('staff')
          .select('full_name, role, active')
          .order('full_name');

        const { data: customers, error: customersError } = await supabaseClient
          .from('customers')
          .select('customer_code, full_name, phone')
          .order('full_name');

        const { data: invoices, error: invoicesError } = await supabaseClient
          .from('invoices')
          .select('invoice_number, status, total, issue_date')
          .order('issue_date', { ascending: false });

        if (companyError) throw companyError;
        if (staffError) throw staffError;
        if (customersError) throw customersError;
        if (invoicesError) throw invoicesError;

        document.getElementById('status').textContent = 'Success';
        document.getElementById('company').textContent = JSON.stringify(company, null, 2);
        document.getElementById('staff').textContent = JSON.stringify(staff, null, 2);
        document.getElementById('customers').textContent = JSON.stringify(customers, null, 2);
        document.getElementById('invoices').textContent = JSON.stringify(invoices, null, 2);
      } catch (err) {
        document.getElementById('status').textContent = 'Error: ' + err.message;
        document.getElementById('company').textContent = 'Failed';
        document.getElementById('staff').textContent = 'Failed';
        document.getElementById('customers').textContent = 'Failed';
        document.getElementById('invoices').textContent = 'Failed';
      }
    }

    loadData();
  </script>
</body>
</html>
