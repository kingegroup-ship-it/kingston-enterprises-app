<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kingston Live Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0f0f0f;
      --card:#1a1a1a;
      --card2:#151515;
      --border:#2b2b2b;
      --gold:#d4a63f;
      --text:#f4f4f4;
      --muted:#b8b8b8;
      --green:#2e9d59;
      --blue:#3b82f6;
      --orange:#d97706;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:24px;
      flex-wrap:wrap;
    }

    .brand h1{
      margin:0 0 8px 0;
      color:var(--gold);
      font-size:34px;
    }

    .brand p{
      margin:0;
      color:var(--muted);
    }

    .status{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px 16px;
      color:var(--muted);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:16px;
      margin-bottom:20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
    }

    .stat-title{
      color:var(--muted);
      font-size:14px;
      margin-bottom:10px;
    }

    .stat-value{
      font-size:34px;
      font-weight:700;
      color:var(--gold);
    }

    .layout{
      display:grid;
      grid-template-columns:1.4fr 1fr;
      gap:16px;
    }

    .section-title{
      margin:0 0 14px 0;
      color:var(--gold);
      font-size:22px;
    }

    .row{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      margin-bottom:12px;
    }

    .row-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .row-title{
      font-weight:700;
      font-size:16px;
    }

    .row-sub{
      color:var(--muted);
      margin-top:6px;
      font-size:14px;
    }

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      color:white;
    }

    .scheduled{ background:var(--blue); }
    .active{ background:var(--orange); }
    .completed{ background:var(--green); }
    .draft{ background:#6b7280; }

    .empty{
      color:var(--muted);
      padding:18px;
      border:1px dashed var(--border);
      border-radius:12px;
      background:var(--card2);
    }

    .company-box{
      margin-bottom:16px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
    }

    .company-box p{
      margin:6px 0;
      color:var(--muted);
    }

    .small{
      font-size:13px;
      color:var(--muted);
    }

    @media (max-width: 980px){
      .grid{
        grid-template-columns:repeat(2, 1fr);
      }
      .layout{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 640px){
      .grid{
        grid-template-columns:1fr;
      }
      .brand h1{
        font-size:28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">
        <h1>Kingston Live Dashboard</h1>
        <p>Real data from Supabase</p>
      </div>
      <div class="status" id="status">Connecting...</div>
    </div>

    <div class="company-box">
      <h2 class="section-title">Company</h2>
      <div id="companyBox">Loading company...</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="stat-title">Staff</div>
        <div class="stat-value" id="staffCount">0</div>
      </div>
      <div class="card">
        <div class="stat-title">Customers</div>
        <div class="stat-value" id="customersCount">0</div>
      </div>
      <div class="card">
        <div class="stat-title">Jobs</div>
        <div class="stat-value" id="jobsCount">0</div>
      </div>
      <div class="card">
        <div class="stat-title">Invoices</div>
        <div class="stat-value" id="invoicesCount">0</div>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <h2 class="section-title">Recent Jobs</h2>
        <div id="jobsList">Loading jobs...</div>
      </div>

      <div>
        <div class="card" style="margin-bottom:16px;">
          <h2 class="section-title">Latest Invoice</h2>
          <div id="latestInvoice">Loading invoice...</div>
        </div>

        <div class="card">
          <h2 class="section-title">Active Staff</h2>
          <div id="staffList">Loading staff...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ΒΑΛΕ ΕΔΩ ΤΙΣ ΙΔΙΕΣ 2 ΣΩΣΤΕΣ ΓΡΑΜΜΕΣ ΑΠΟ ΤΟ supabase-test.html
    const SUPABASE_URL = 'https://qmcznxnajxmcbjdfzoqb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0P8BczXXThDbyz6aCUmqvQ_bIbR6CN9';

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const statusEl = document.getElementById('status');
    const companyBox = document.getElementById('companyBox');
    const staffCountEl = document.getElementById('staffCount');
    const customersCountEl = document.getElementById('customersCount');
    const jobsCountEl = document.getElementById('jobsCount');
    const invoicesCountEl = document.getElementById('invoicesCount');
    const jobsListEl = document.getElementById('jobsList');
    const latestInvoiceEl = document.getElementById('latestInvoice');
    const staffListEl = document.getElementById('staffList');

    function badgeClass(status) {
      if (status === 'scheduled') return 'scheduled';
      if (status === 'active') return 'active';
      if (status === 'completed') return 'completed';
      return 'draft';
    }

    function safe(value) {
      return value ?? '-';
    }

    async function loadDashboard() {
      try {
        statusEl.textContent = 'Loading company...';

        const { data: company, error: companyError } = await client
          .from('company_settings')
          .select('*')
          .limit(1);

        if (companyError) throw companyError;

        statusEl.textContent = 'Loading staff...';

        const { data: staff, error: staffError } = await client
          .from('staff')
          .select('id, full_name, role, active')
          .order('full_name');

        if (staffError) throw staffError;

        statusEl.textContent = 'Loading customers...';

        const { data: customers, error: customersError } = await client
          .from('customers')
          .select('id, customer_code, full_name, phone')
          .order('full_name');

        if (customersError) throw customersError;

        statusEl.textContent = 'Loading jobs...';

        const { data: jobs, error: jobsError } = await client
          .from('jobs')
          .select('id, job_code, title, description, status, scheduled_date, start_time, suburb')
          .order('created_at', { ascending: false });

        if (jobsError) throw jobsError;

        statusEl.textContent = 'Loading invoices...';

        const { data: invoices, error: invoicesError } = await client
          .from('invoices')
          .select('id, invoice_number, status, total, issue_date, due_date')
          .order('created_at', { ascending: false });

        if (invoicesError) throw invoicesError;

        statusEl.textContent = 'Success';

        // COMPANY
        const c = company && company.length ? company[0] : null;
        if (c) {
          companyBox.innerHTML = `
            <p><strong>${safe(c.business_name)}</strong></p>
            <p>Owner: ${safe(c.owner_name)}</p>
            <p>ABN: ${safe(c.abn)}</p>
            <p>Phone: ${safe(c.phone)}</p>
            <p>Email: ${safe(c.email)}</p>
            <p>Address: ${safe(c.address_line)}, ${safe(c.suburb)}, ${safe(c.state)} ${safe(c.postcode)}</p>
          `;
        } else {
          companyBox.innerHTML = `<div class="empty">No company record found.</div>`;
        }

        // COUNTS
        staffCountEl.textContent = staff ? staff.length : 0;
        customersCountEl.textContent = customers ? customers.length : 0;
        jobsCountEl.textContent = jobs ? jobs.length : 0;
        invoicesCountEl.textContent = invoices ? invoices.length : 0;

        // JOBS
        if (jobs && jobs.length) {
          jobsListEl.innerHTML = jobs.slice(0, 8).map(job => `
            <div class="row">
              <div class="row-top">
                <div class="row-title">${safe(job.title)} <span class="small">(${safe(job.job_code)})</span></div>
                <span class="badge ${badgeClass(job.status)}">${safe(job.status)}</span>
              </div>
              <div class="row-sub">Date: ${safe(job.scheduled_date)} | Time: ${safe(job.start_time)} | Suburb: ${safe(job.suburb)}</div>
              <div class="row-sub">${safe(job.description)}</div>
            </div>
          `).join('');
        } else {
          jobsListEl.innerHTML = `<div class="empty">No jobs found.</div>`;
        }

        // LATEST INVOICE
        if (invoices && invoices.length) {
          const inv = invoices[0];
          latestInvoiceEl.innerHTML = `
            <div class="row">
              <div class="row-top">
                <div class="row-title">${safe(inv.invoice_number)}</div>
                <span class="badge ${badgeClass(inv.status)}">${safe(inv.status)}</span>
              </div>
              <div class="row-sub">Issue Date: ${safe(inv.issue_date)}</div>
              <div class="row-sub">Due Date: ${safe(inv.due_date)}</div>
              <div class="row-sub">Total: $${safe(inv.total)}</div>
            </div>
          `;
        } else {
          latestInvoiceEl.innerHTML = `<div class="empty">No invoices found.</div>`;
        }

        // STAFF
        if (staff && staff.length) {
          staffListEl.innerHTML = staff.slice(0, 8).map(member => `
            <div class="row">
              <div class="row-top">
                <div class="row-title">${safe(member.full_name)}</div>
                <span class="badge ${member.active ? 'completed' : 'draft'}">${member.active ? 'active' : 'inactive'}</span>
              </div>
              <div class="row-sub">${safe(member.role)}</div>
            </div>
          `).join('');
        } else {
          staffListEl.innerHTML = `<div class="empty">No staff found.</div>`;
        }

      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        companyBox.innerHTML = `<div class="empty">Failed</div>`;
        jobsListEl.innerHTML = `<div class="empty">Failed</div>`;
        latestInvoiceEl.innerHTML = `<div class="empty">Failed</div>`;
        staffListEl.innerHTML = `<div class="empty">Failed</div>`;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
